# The JetBrains Runtime (required by Jewel's DecoratedWindow) is provided portably via a
# Java toolchain (vendor = JETBRAINS) in build.gradle.kts, resolved/downloaded by the
# foojay plugin. Kotlin compilation and the Compose `run` task use that toolchain JVM,
# so no machine-specific org.gradle.java.home is needed.

org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.configuration-cache=false

kotlin.code.style=official
